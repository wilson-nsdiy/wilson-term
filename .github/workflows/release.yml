name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  build:
    needs: check
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-2022
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup MSVC (Windows)
        if: matrix.platform == 'win'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          vsversion: 2022

      - name: Set version from tag
        run: |
          node -e "
            const fs = require('fs');
            const tag = process.env.TAG;
            const version = tag.replace(/^v/, '');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = version;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Version set to ' + version);
          "
        env:
          TAG: ${{ github.ref_name }}

      - name: Install dependencies
        run: npm ci

      - name: Build & Package
        run: npx electron-vite build && npx electron-builder --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/*.yml
            !release/builder-debug.yml
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*

      - name: List all downloaded artifacts
        run: find release-artifacts/ -type f -exec ls -lh {} \;

      - name: Remove builder-debug files
        run: find release-artifacts/ -name "builder-debug.yml" -delete -print || true

      - name: Determine prerelease
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *beta* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          make_latest: ${{ steps.prerelease.outputs.is_prerelease != 'true' }}
          generate_release_notes: true
          body: |
            ## Wilson Term ${{ github.ref_name }}

            Wilson Term 是一个支持 SSH / Telnet / 串口 / 本地终端连接的模拟终端。

            ### 下载安装

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `Wilson-Term-${{ github.ref_name }}-win-x64.exe` | NSIS 安装程序 |
            | Linux (AppImage) | `Wilson-Term-${{ github.ref_name }}-linux-x64.AppImage` | `chmod +x` 后运行 |
            | Linux (deb) | `Wilson-Term-${{ github.ref_name }}-linux-x64.deb` | `sudo dpkg -i` 安装 |

            ### 系统要求

            - Windows 10+ / Linux（Ubuntu 20.04+ / Debian 11+）
            - 串口功能需要硬件权限（Linux 需加入 `dialout` 组）

            ---

            💬 发现问题？请提交 [Issue](https://github.com/${{ github.repository }}/issues)
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.blockmap
            release-artifacts/**/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
