name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  IS_PRERELEASE: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-dev') || contains(github.ref_name, '-canary') }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Validate CHANGELOG.md
        run: |
          echo "=== Validating CHANGELOG.md ==="

          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md not found"
            exit 1
          fi

          # Check version headers format: ## [vX.Y.Z] or ## [vX.Y.Z-beta.N] etc.
          INVALID=$(grep '^## \[' CHANGELOG.md | grep -v '^## \[Unreleased\]' | grep -vE '^## \[v[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$' || true)
          if [ -n "$INVALID" ]; then
            echo "::error::Invalid version header format (expected '## [vX.Y.Z] - YYYY-MM-DD'):"
            echo "$INVALID"
            exit 1
          fi

          # Check no duplicate versions
          VERSIONS=$(grep -oP '^## \[\Kv[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?' CHANGELOG.md || true)
          DUPLICATES=$(echo "$VERSIONS" | sort | uniq -d)
          if [ -n "$DUPLICATES" ]; then
            echo "::error::Duplicate version entries found:"
            echo "$DUPLICATES"
            exit 1
          fi

          # Check tag version exists in CHANGELOG (fatal for stable, warning for prerelease)
          TAG_VERSION="${{ github.ref_name }}"
          if grep -q "^## \[${TAG_VERSION}\]" CHANGELOG.md; then
            echo "Tag version '${TAG_VERSION}' found in CHANGELOG.md"
          else
            if [ "${IS_PRERELEASE}" = "true" ]; then
              echo "::warning::Tag version '${TAG_VERSION}' not found in CHANGELOG.md (prerelease, skipping)"
            else
              echo "::error::Tag version '${TAG_VERSION}' not found in CHANGELOG.md"
              exit 1
            fi
          fi

          echo "CHANGELOG.md validation passed"
        env:
          IS_PRERELEASE: ${{ env.IS_PRERELEASE }}

  build:
    needs: check
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-2022
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate version match
        shell: bash
        run: |
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_MAJOR_MINOR_PATCH=$(echo "$TAG_VERSION" | cut -d'-' -f1)
          PKG_MAJOR_MINOR_PATCH=$(echo "$PKG_VERSION" | cut -d'-' -f1)

          echo "Tag X.Y.Z:      $TAG_MAJOR_MINOR_PATCH"
          echo "Package X.Y.Z:  $PKG_MAJOR_MINOR_PATCH"

          if [ "$TAG_MAJOR_MINOR_PATCH" != "$PKG_MAJOR_MINOR_PATCH" ]; then
            echo "::error::Version mismatch! Tag is v$TAG_MAJOR_MINOR_PATCH but package.json is v$PKG_MAJOR_MINOR_PATCH"
            exit 1
          fi
        env:
          TAG: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup MSVC (Windows)
        if: matrix.platform == 'win'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          vsversion: 2022

      - name: Install dependencies
        run: npm ci

      - name: Set prerelease version in package.json
        if: env.IS_PRERELEASE == 'true'
        run: node scripts/set-prerelease-version.js
        env:
          TAG: ${{ github.ref_name }}

      - name: Build & Package
        run: npx electron-vite build && npx electron-builder --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/*.yml
            !release/builder-debug.yml
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*

      - name: List all downloaded artifacts
        run: find release-artifacts/ -type f -exec ls -lh {} \;

      - name: Remove builder-debug files
        run: find release-artifacts/ -name "builder-debug.yml" -delete -print || true

      - name: Extract changelog for version
        id: changelog
        run: |
          echo "Extracting changelog for version: $TAG"

          # For prerelease tags, fall back to base version (e.g. v0.10.5-alpha.3 -> v0.10.5)
          BASE_VERSION=$(echo "$TAG" | sed 's/-[a-z0-9.]*$//')
          if [ "$TAG" != "$BASE_VERSION" ]; then
            echo "Prerelease detected, will try base version: $BASE_VERSION"
          fi

          extract_changelog() {
            awk -v ver="$1" '
              /^## \[/ {
                if (found) exit
                gsub(/[[\]]/, "")
                gsub(/^## /, "")
                sub(/ - .*/, "")
                if ($0 == ver) found=1
                next
              }
              found && /^## \[/ { exit }
              found { print }
            ' CHANGELOG.md
          }

          CHANGELOG=""
          VERSIONS=("$TAG")
          if [ "$TAG" != "$BASE_VERSION" ]; then
            VERSIONS+=("$BASE_VERSION")
          fi
          for VER in "${VERSIONS[@]}"; do
            RAW=$(extract_changelog "$VER")
            # Trim leading/trailing blank lines
            CHANGELOG=$(printf '%s\n' "$RAW" | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
            if [ -n "$CHANGELOG" ]; then
              echo "Changelog extracted using version: $VER"
              break
            fi
          done

          echo "Changelog content:"
          echo "$CHANGELOG"

          # Build release body to file
          printf '## Wilson Term %s\n\nWilson Term 是一个支持 SSH / Telnet / 串口 / 本地终端连接的模拟终端。\n' "$TAG" > release-body.md

          if [ -n "$CHANGELOG" ]; then
            printf '\n%s\n' "$CHANGELOG" >> release-body.md
          fi

          printf '\n### 下载安装\n\n' >> release-body.md
          printf '| 平台 | 文件 | 说明 |\n' >> release-body.md
          printf '|------|------|------|\n' >> release-body.md
          printf '| Windows | `Wilson-Term-%s-win-x64.exe` | NSIS 安装程序 |\n' "$TAG" >> release-body.md
          printf '| Linux (AppImage) | `Wilson-Term-%s-linux-x64.AppImage` | `chmod +x` 后运行 |\n' "$TAG" >> release-body.md
          printf '| Linux (deb) | `Wilson-Term-%s-linux-x64.deb` | `sudo dpkg -i` 安装 |\n' "$TAG" >> release-body.md
          printf '\n### 系统要求\n\n' >> release-body.md
          printf '%s\n' '- Windows 10+ / Linux（Ubuntu 20.04+ / Debian 11+）' >> release-body.md
          printf '%s\n' '- 串口功能需要硬件权限（Linux 需加入 `dialout` 组）' >> release-body.md
          printf '\n---\n\n💬 发现问题？请提交 [Issue](https://github.com/%s/issues)\n' "$REPO" >> release-body.md
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ env.IS_PRERELEASE }}
          make_latest: ${{ env.IS_PRERELEASE != 'true' }}
          body_path: release-body.md
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.blockmap
            release-artifacts/**/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
