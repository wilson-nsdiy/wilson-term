appId: com.wilson.terminal
productName: Wilson-Term
npmRebuild: false
directories:
  buildResources: resources
  output: release
files:
  - dist/**/*
  - CHANGELOG.json
asarUnpack:
  - node_modules/serialport/**/*
  - node_modules/@serialport/**/*
  - node_modules/ssh2/**/*
  - node_modules/koffi/**/*
  - node_modules/node-pty/**/*
  - "**/*.node"
extraResources:
  - from: resources/icon-256.png
    to: icon.png
win:
  artifactName: Wilson-Term-v${version}-win-x64.${ext}
  target:
    - nsis
  icon: resources/icon.ico
nsis:
  artifactName: Wilson-Term-v${version}-win-x64.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
linux:
  artifactName: Wilson-Term-v${version}-linux-x64.${ext}
  target:
    - AppImage
    - deb
  icon: resources/icon-256.png
afterPack: build/afterPack.js
